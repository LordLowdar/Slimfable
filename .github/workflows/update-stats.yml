name: Update channel stats

on:
  schedule:
    # Daily at 14:17 UTC (~7:17am Pacific). Odd minute avoids GitHub's
    # on-the-hour cron congestion.
    - cron: '17 14 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest stats
        run: node scripts/fetch-stats.mjs

      - name: Commit if changed
        run: |
          # Ignore a diff that only touches the "updated" timestamp.
          if git diff --numstat assets/stats.json | grep -q .; then
            if [ "$(git diff assets/stats.json | grep -cE '^[-+] ' )" -le 2 ]; then
              echo "Only the timestamp changed — skipping commit."
              exit 0
            fi
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/stats.json
            git commit -m "chore: refresh channel stats"
            git push
          else
            echo "No changes."
          fi
