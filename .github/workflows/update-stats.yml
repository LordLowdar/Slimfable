name: Update channel stats

on:
  schedule:
    # Daily at 14:17 UTC (~7:17am Pacific). Odd minute avoids GitHub's
    # on-the-hour cron congestion.
    - cron: '17 14 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest stats
        run: node scripts/fetch-stats.mjs

      - name: Commit if changed
        run: |
          # The fetch script skips writes when nothing but the timestamp
          # changed, so any diff here is a real update.
          git add assets/stats.json assets/instagram.json assets/ig
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: refresh channel stats"
            git push
          fi
